<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  font-family:Arial;
  background:#f4f6fb;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.error{
  color:red;
  font-size:12px;
  margin-bottom:10px;
}
</style>

</head>
<body>

<div class="card">
<h2>Login</h2>

<div id="error" class="error"></div>

<input id="email" placeholder="email">
<input id="senha" type="password" placeholder="senha">

<button onclick="login()">Entrar</button>

<p style="font-size:12px;margin-top:10px">
admin@clinica.com<br>
123456
</p>
</div>

<script src="/js/auth.js"></script>

</body>
</html>
