<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ClinicaApp</title>

<style>
body{font-family:Arial;margin:0;display:flex}
aside{width:220px;background:#f4f4f4;padding:12px}
main{flex:1;padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
button{cursor:pointer;margin-right:6px}
#modal-paciente,#modal{
  display:none;
  position:fixed;
  top:12%;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:20px;
  border:1px solid #ccc;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  min-width:380px;
  z-index:1000
}
input,select{
  padding:8px;
  margin-bottom:10px;
  width:100%;
  box-sizing:border-box
}
label{
  display:block;
  font-size:13px;
  margin-bottom:4px
}
</style>

</head>

<body>

<aside>
  <h3>ClinicaApp</h3>

  <p id="user-info"></p>

  <button onclick="mostrar('pacientes')">Pacientes</button>
  <button onclick="mostrar('agenda')">Agenda</button>
  <button id="nav-financeiro" onclick="mostrar('financeiro')">Financeiro</button>
  <button onclick="logout()">Sair</button>
</aside>

<main>

  <section id="pacientes">
    <div class="card">
      <button id="btn-novo-paciente" onclick="abrirModalPaciente()">+ Novo Paciente</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-pacientes"></tbody>
      </table>
    </div>
  </section>

  <section id="agenda" style="display:none;">
    <div class="card">
      <label for="agenda-medico-filtro">Médico</label>
      <select id="agenda-medico-filtro"></select>

      <label for="agenda-data">Data</label>
      <input type="date" id="agenda-data">

      <button id="btn-novo-agendamento" onclick="abrirModalAg()">+ Novo</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Hora</th>
            <th>Paciente</th>
            <th>Médico</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="agenda-lista"></tbody>
      </table>
    </div>
  </section>

  <section id="financeiro" style="display:none;">
    <div class="card">
      <h3>Financeiro</h3>
      <p>Módulo restrito ao administrador.</p>
    </div>
  </section>

</main>

<div id="modal-paciente">
  <div class="card">
    <h3>Novo Paciente</h3>

    <input id="p-nome" placeholder="Nome">
    <input id="p-telefone" placeholder="Telefone">

    <button onclick="salvarPaciente()">Salvar</button>
    <button onclick="fecharModalPaciente()">Cancelar</button>
  </div>
</div>

<div id="modal">
  <div class="card">
    <h3>Novo Agendamento</h3>

    <label for="ag-paciente">Paciente</label>
    <select id="ag-paciente"></select>

    <label for="ag-medico">Médico</label>
    <select id="ag-medico"></select>

    <label for="ag-data">Data</label>
    <input type="date" id="ag-data">

    <label for="ag-hora">Hora</label>
    <input type="time" id="ag-hora">

    <label for="ag-status">Status</label>
    <select id="ag-status">
      <option value="agendado">Agendado</option>
      <option value="confirmado">Confirmado</option>
      <option value="atendido">Atendido</option>
      <option value="cancelado">Cancelado</option>
    </select>

    <button onclick="salvarAg()">Salvar</button>
    <button onclick="fecharModalAg()">Cancelar</button>
  </div>
</div>

<script src="/js/auth-guard.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
